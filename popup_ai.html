<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles/popup_a.css">
  </head>
  <body>
    <h1>Illumination</h1>
    <h2>Rating</h2>
    <p id="aierror" hidden>GPT has not yet rated this website, or the rating provided was invalid</p>
    <div class="rating" hidden>
        <div class="star-rating" id="1">
            <p id="category">Drugs/Alcohol</p>
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
            <span id="rating-value" hidden>0</span>
        </div>
        <div class="star-rating" id="2">
            <p id="category">Extremism</p>
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
            <span id="rating-value" hidden>0</span>
        </div>
        <div class="star-rating" id="3">
            <p id="category">Harassment</p>
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
            <span id="rating-value" hidden>0</span>
        </div>
        <div class="star-rating" id="4">
            <p id="category">Information Security</p>
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
            <span id="rating-value" hidden>0</span>
        </div>
        <div class="star-rating" id="5">
            <p id="category">Sexual Content</p>
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
            <span id="rating-value" hidden>0</span>
        </div>
        <div class="star-rating" id="6">
            <p id="category">Violence</p>
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
            <span id="rating-value" hidden>0</span>
        </div><br><br>
    </div>
    <button id="correct">Correct Rating</button>
  </body>
</html>
